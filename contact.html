<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | RESESIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">RESE<span>SIA</span></a>
      <button class="menu-toggle" type="button">MENU</button>
      <nav class="primary-nav">
        <ul>
          <li><a href="index.html">トップ</a></li>
          <li><a href="services.html">サービス</a></li>
          <li><a href="company.html">会社概要</a></li>
          <li><a href="contact.html" class="active">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-head">
          <span class="eyebrow">Contact</span>
          <h1>お問い合わせ</h1>
          <p>不動産売買・賃貸管理・リフォームのご相談を受け付けています。2営業日以内を目安にご連絡いたします。</p>
        </div>
        <div class="grid-2">
          <article class="card">
            <h3>お電話・メールでのお問い合わせ</h3>
            <p>Tel: 06-7777-4801<br>Mobile: 080-2444-1872<br>Mail: resesia.corporate@gmail.com</p>
            <p>受付時間: 平日 9:00 - 18:00</p>
          </article>
          <article class="contact-box">
            <p id="form-status" class="form-status" aria-live="polite"></p>
            <form id="contact-form" action="https://formspree.io/f/xojpljye" method="POST">
              <div class="form-row">
                <div class="form-group">
                  <label for="name">お名前 *</label>
                  <input id="name" type="text" name="name" required>
                </div>
                <div class="form-group">
                  <label for="kana">フリガナ</label>
                  <input id="kana" type="text" name="kana">
                </div>
              </div>
              <div class="form-group">
                <label for="email">メールアドレス *</label>
                <input id="email" type="email" name="email" required>
              </div>
              <div class="form-group">
                <label for="phone">電話番号</label>
                <input id="phone" type="tel" name="phone">
              </div>
              <div class="form-group">
                <label for="inquiryType">お問い合わせ種別</label>
                <select id="inquiryType" name="inquiryType">
                  <option value="">選択してください</option>
                  <option value="buy">不動産売買について</option>
                  <option value="rent">賃貸管理について</option>
                  <option value="reform">リフォームについて</option>
                  <option value="other">その他</option>
                </select>
              </div>
              <div class="form-group">
                <label for="message">お問い合わせ内容 *</label>
                <textarea id="message" name="message" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary">送信する</button>
            </form>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <div class="logo">RESE<span>SIA</span></div>
      <nav class="footer-links">
        <a href="privacy.html">プライバシーポリシー</a>
      </nav>
      <div>© 2026 RESESIA Co., Ltd. All Rights Reserved.</div>
    </div>
  </footer>

  <script src="assets/main.js"></script>
  <script src="assets/contact.js"></script>
</body>
</html>
